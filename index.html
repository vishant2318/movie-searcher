<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer Pro</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                🎬 Movie Explorer
            </a>

            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#trending">
                            Trending
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">
                            Watchlist
                        </a>
                    </li>
                </ul>

                <button id="themeToggle"
                    class="btn btn-outline-light">
                    <i class="bi bi-moon-fill"></i>
                </button>

            </div>
        </div>
    </nav>

    
    <section class="hero-section text-white d-flex align-items-center">
        <div class="container text-center">

            <h1 class="display-3 fw-bold mb-3">
                Discover Movies You'll Love
            </h1>

            <p class="lead mb-4">
                Search thousands of movies, ratings,
                reviews and details instantly.
            </p>

            <div class="row justify-content-center">
                <div class="col-lg-7">

                    <div class="input-group input-group-lg">

                        <input
                            type="text"
                            id="searchInput"
                            class="form-control"
                            placeholder="Search movies...">

                        <button
                            id="searchBtn"
                            type="button"
                            class="btn btn-danger">

                            <i class="bi bi-search"></i>
                            Search
                        </button>

                    </div>

                </div>
            </div>

        </div>
    </section>
    <section id="trending" class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold">
                🔥 Trending Movies
            </h2>

            <button class="btn btn-outline-primary">
                View All
            </button>

        </div>

        <div class="row g-4" id="trendingMovies">


        </div>

    </section>

    <section class="container pb-5">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold">
                Search Results
            </h2>

        </div>

        <div class="row g-4" id="movieResults">


        </div>

    </section>

    <div id="loader" class="text-center my-5 d-none">

        <div class="spinner-border text-danger"
            role="status">
            <span class="visually-hidden">
                Loading...
            </span>
        </div>

    </div>

    <div class="modal fade"
        id="movieModal"
        tabindex="-1">

        <div class="modal-dialog modal-lg modal-dialog-centered">

            <div class="modal-content bg-dark text-light">

                <div class="modal-header border-secondary">

                    <h5 class="modal-title">
                        Movie Details
                    </h5>

                    <button
                        type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <div id="movieDetails">


                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer class="bg-dark text-center text-light py-4">

        <div class="container">

            <p class="mb-1">
                Movie Explorer Pro
            </p>

            <small>
                Built with HTML, CSS,
                Bootstrap and JavaScript
            </small>

        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>

</body>
</html>
